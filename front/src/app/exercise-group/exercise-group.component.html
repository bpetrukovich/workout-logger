<div class="exercise-group">
  <div class="group-header">
    <mat-icon class="group-icon">{{ group().icon }}</mat-icon>
    <span class="group-name">{{ group().name }}</span>
  </div>

  <mat-list class="exercise-list">
    @for (exercise of group().exercises; track exercise.name; let last = $last) {
      <app-exercise [exercise]="exercise"></app-exercise>
      @if (!last) {
        <mat-divider></mat-divider>
      }
    }
  </mat-list>
</div>
